# Event-driven autonomous trigger for {{PROJECT_NAME}}

name: "Copilot Direct Assign"

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign-to-copilot:
    if: github.event.label.name == '{{COPILOT_LABEL}}'
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['copilot'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '🤖 **Copilot is on it.**',
                '',
                'The autonomous agent will:',
                '1. Explore the relevant code',
                '2. Create an implementation plan',
                '3. Implement using Point-to-Point edits only (no whole-file rewrites)',
                '4. Verify (lint + build + tests) with Reflexion-guided self-correction',
                '5. Open a PR with a full change summary',
              ].join('\n'),
            });
